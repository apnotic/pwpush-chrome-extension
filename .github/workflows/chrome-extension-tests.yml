name: Chrome Extension Tests

on:
  pull_request:
    paths:
      - "chrome/**"
      - ".github/workflows/chrome-extension-tests.yml"
  push:
    branches: [main]
    paths:
      - "chrome/**"
      - ".github/workflows/chrome-extension-tests.yml"

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chrome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: npm run validate:manifest

      - name: Run unit tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    defaults:
      run:
        working-directory: chrome
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chrome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run extension smoke test
        run: xvfb-run -a npm run test:e2e
